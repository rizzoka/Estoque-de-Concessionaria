<div class="container">
  <div class="row">
    <div class="col-lg-4"></div>

    <div class="col-lg-4 centralizar topo">
      <div class="card">
        <div class="card-body">
        <h3>Autentique-se:</h3>    
        <br>
          <mdb-form-control>
            <input mdbInput type="text" id="usuario" class="form-control" [(ngModel)]="login.username" (keyup.enter)="logar()"/> <!-- o ngModel é a ligação entre o input e a variável usuario do componente -->
            <label mdbLabel class="form-label" for="usuario">Usuário</label>
          </mdb-form-control>
          <br />
          <mdb-form-control>
            <input mdbInput type="password" id="senha" class="form-control" [(ngModel)]="login.password" (keyup.enter)="logar()"/>
            <label mdbLabel class="form-label" for="senha">Senha</label>
          </mdb-form-control>

          <button
            type="button"
            class="btn btn-primary btn-rounded mt-4"
            mdbRipple (click)="logar()"
          >
            Acessar
          </button>
        </div>
      </div>
    </div>

    <div class="col-lg-4"></div>
  </div>
</div>
